<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Email Signature</title>
</head>

<body style="margin:0; padding:0; background:#ffffff;">

<table cellpadding="0" cellspacing="0" border="0"
  style="
    width:500px;
    font-family:Aptos,'Segoe UI',Arial,sans-serif;
    color:#111827;
    border-collapse:collapse;
  ">

  <tr>

    <!-- LEFT IMAGE -->
    <td
      valign="middle"
      style="
        width:180px;
        padding-right:28px;
        border-right:3px solid #D1D5DB;
      "
    >

      <img
        src="https://medscred-s3-bucket.s3.ap-south-1.amazonaws.com/uploads/903eb951-8d56-4530-9263-74f4a87b7ae4.jpg"
        width="160"
        alt="Hardik Choksi"
        style="
          display:block;
          border:0;
          outline:none;
          text-decoration:none;
          width:160px;
          height:auto;
        "
      />

    </td>

    <!-- RIGHT CONTENT -->
    <td
      valign="top"
      style="
        padding-left:28px;
      "
    >

      <!-- NAME -->
      <div
        style="
          font-size:28px;
          line-height:30px;
          font-weight:800;
          letter-spacing:-0.5px;
          color:#111827;
          margin-bottom:6px;
        "
      >
        HARDIK CHOKSI
      </div>

      <!-- ROLE -->
      <div
        style="
          font-size:14px;
          font-weight:600;
          color:#6B7280;
          margin-bottom:18px;
        "
      >
        Founder
      </div>

      <!-- DIVIDER -->
      <div
        style="
          width:72px;
          height:3px;
          background:#9CA3AF;
          margin-bottom:18px;
        "
      ></div>

      <!-- CONTACT TABLE -->
      <table cellpadding="0" cellspacing="0" border="0">

        <!-- PHONE -->
        <tr>
          <td
            valign="top"
            style="
              padding-bottom:10px;
              padding-right:10px;
              color:#9CA3AF;
              font-size:13px;
              font-weight:700;
            "
          >
            P
          </td>

          <td
            valign="top"
            style="
              padding-bottom:10px;
              font-size:13px;
              color:#374151;
            "
          >
            <a
              href="tel:+918511012649"
              style="
                color:#374151;
                text-decoration:none;
              "
            >
              +91 85110 12649
            </a>
          </td>
        </tr>

        <!-- EMAIL -->
        <tr>
          <td
            valign="top"
            style="
              padding-bottom:10px;
              padding-right:10px;
              color:#9CA3AF;
              font-size:13px;
              font-weight:700;
            "
          >
            E
          </td>

          <td
            valign="top"
            style="
              padding-bottom:10px;
              font-size:13px;
              color:#374151;
            "
          >
            <a
              href="mailto:hardik@medscred.com"
              style="
                color:#374151;
                text-decoration:none;
              "
            >
              hardik@medscred.com
            </a>
          </td>
        </tr>

        <!-- WEBSITE -->
        <tr>
          <td
            valign="top"
            style="
              padding-bottom:10px;
              padding-right:10px;
              color:#9CA3AF;
              font-size:13px;
              font-weight:700;
            "
          >
            W
          </td>

          <td
            valign="top"
            style="
              padding-bottom:10px;
              font-size:13px;
              color:#374151;
            "
          >
            <a
              href="https://medscred.com"
              target="_blank"
              style="
                color:#374151;
                text-decoration:none;
              "
            >
              www.medscred.com
            </a>
          </td>
        </tr>

        <!-- LINKEDIN -->
        <tr>
          <td
            valign="top"
            style="
              padding-right:10px;
              color:#9CA3AF;
              font-size:13px;
              font-weight:700;
            "
          >
            in
          </td>

          <td
            valign="top"
            style="
              font-size:13px;
              color:#374151;
            "
          >
            <a
              href="https://www.linkedin.com/in/hardik-choksi-fcca-804a1812/"
              target="_blank"
              style="
                color:#374151;
                text-decoration:none;
              "
            >
              Hardik Choksi
            </a>
          </td>
        </tr>

      </table>

    </td>

  </tr>

</table>

</body>
</html>
